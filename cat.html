<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日猫猫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .cat-container {
            max-width: 80%;
            max-height: 70vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            background: white;
            padding: 10px;
        }
        .cat-container img {
            max-width: 100%;
            max-height: 65vh;
            border-radius: 15px;
            display: block;
            object-fit: contain;
        }
        .tip {
            margin-top: 2rem;
            font-size: 1.2rem;
            opacity: 0.9;
            text-align: center;
        }
        .refresh-btn {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .cat-container { max-width: 95%; }
            .tip { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <h1>今日份的可爱猫猫 🐱</h1>
    <div class="cat-container">
        <img src="https://cataas.com/cat" alt="可爱猫猫" id="catImg">
    </div>
    <p class="tip">点击刷新按钮或者刷新页面，就能看不同的猫猫哦~</p>
    <button class="refresh-btn" onclick="refreshCat()">换一只猫猫</button>

    <script>
        function refreshCat() {
            document.getElementById('catImg').src = 'https://cataas.com/cat?' + new Date().getTime();
        }
    </script>
</body>
</html>
